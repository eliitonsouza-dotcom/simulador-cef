<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso — X2 Negócios Imobiliários</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#0f0f1a;--bg3:#17172a;
  --border:rgba(255,255,255,.08);--borderb:rgba(255,255,255,.18);
  --gold:#f5c542;--goldD:rgba(245,197,66,.13);--goldG:rgba(245,197,66,.3);
  --green:#10d4a8;--red:#ff5f7e;
  --text:#eef0f7;--text2:#8890aa;--text3:#4a5268;
  --r:14px;--rs:8px;--sh:0 8px 32px rgba(0,0,0,.5);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--sh);display:flex;flex-direction:column;align-items:center;gap:28px}
.logo-box{width:56px;height:56px;background:linear-gradient(135deg,#f5c542,#ff9d00);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 28px var(--goldG)}
h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
p.sub{font-size:12px;color:var(--text2);margin-top:-18px;text-align:center}
form{width:100%;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:600;color:var(--text2)}
.field input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:var(--rs);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,66,.12)}
.btn{width:100%;padding:13px;border-radius:var(--rs);border:none;background:linear-gradient(135deg,#f5c542,#e6a800);color:#000;font-weight:700;font-size:15px;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.erro{background:rgba(255,95,126,.1);border:1px solid rgba(255,95,126,.3);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--red);text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo-box">🏠</div>
  <div style="text-align:center">
    <h1>X2 Negócios Imobiliários</h1>
    <p class="sub" style="margin-top:6px">Simulador CEF · Acesso restrito</p>
  </div>

  {% if erro %}
  <div class="erro">Usuário ou senha incorretos. Tente novamente.</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Usuário</label>
      <input type="text" name="usuario" placeholder="seu usuário" required autofocus>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" name="senha" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
